---
- name: Install latest Java on target VMs
  hosts: all
  become: true
  gather_facts: true
  vars:
    redhat_java_package: >-
      {{
        "java-17-amazon-corretto"
        if ansible_facts["distribution"] == "Amazon"
        else "java-17-openjdk"
      }}

  tasks:
    - name: Refresh apt cache on Debian/Ubuntu
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts["os_family"] == "Debian"

    - name: Install latest JDK package on Debian/Ubuntu
      ansible.builtin.apt:
        name: default-jdk
        state: latest
      when: ansible_facts["os_family"] == "Debian"

    - name: Install latest Java package on RHEL-family systems
      ansible.builtin.package:
        name: "{{ redhat_java_package }}"
        state: latest
      when: ansible_facts["os_family"] == "RedHat"

    - name: Verify Java is installed
      ansible.builtin.command: java -version
      register: java_version_cmd
      changed_when: false

    - name: Fetch SSM parameter named test
      ansible.builtin.command: aws ssm get-parameters --names test
      register: ssm_parameter_cmd
      changed_when: false

    - name: Show SSM parameter command output
      ansible.builtin.debug:
        var: ssm_parameter_cmd.stdout

    - name: Print AWS credential environment variables from control node
      ansible.builtin.debug:
        msg:
          - "AWS_ACCESS_KEY_ID={{ lookup('ansible.builtin.env', 'AWS_ACCESS_KEY_ID') | default('UNSET', true) }}"
          - "AWS_SECRET_ACCESS_KEY={{ lookup('ansible.builtin.env', 'AWS_SECRET_ACCESS_KEY') | default('UNSET', true) }}"
          - "AWS_SESSION_TOKEN={{ lookup('ansible.builtin.env', 'AWS_SESSION_TOKEN') | default('UNSET', true) }}"

    - name: Show Java version output
      ansible.builtin.debug:
        var: java_version_cmd.stderr_lines
