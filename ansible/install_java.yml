---
- name: Install latest Java on target VMs
  hosts: all
  become: true
  gather_facts: true
  vars:
    redhat_java_package: >-
      {{
        "java-17-amazon-corretto"
        if ansible_facts["distribution"] == "Amazon"
        else "java-17-openjdk"
      }}

  tasks:
    - name: Check AWS identity from control node
      ansible.builtin.command: aws sts get-caller-identity --output json
      delegate_to: localhost
      run_once: true
      register: aws_identity_cmd
      changed_when: false
      failed_when: false

    - name: Refresh apt cache on Debian/Ubuntu
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_facts["os_family"] == "Debian"

    - name: Install latest JDK package on Debian/Ubuntu
      ansible.builtin.apt:
        name: default-jdk
        state: latest
      when: ansible_facts["os_family"] == "Debian"

    - name: Install latest Java package on RHEL-family systems
      ansible.builtin.package:
        name: "{{ redhat_java_package }}"
        state: latest
      when: ansible_facts["os_family"] == "RedHat"

    - name: Verify Java is installed
      ansible.builtin.command: java -version
      register: java_version_cmd
      changed_when: false

    - name: Fetch SSM parameter named test from control node
      ansible.builtin.command: aws ssm get-parameter --name test --output json
      delegate_to: localhost
      run_once: true
      register: ssm_parameter_cmd
      changed_when: false
      when: aws_identity_cmd.rc == 0

    - name: Skip SSM read when AWS credentials are unavailable
      ansible.builtin.debug:
        msg: "Skipping SSM fetch because AWS credentials are not configured in the Ansible runtime."
      when: aws_identity_cmd.rc != 0

    - name: Show SSM parameter command output
      ansible.builtin.debug:
        var: ssm_parameter_cmd.stdout
      when: aws_identity_cmd.rc == 0

    - name: Show Java version output
      ansible.builtin.debug:
        var: java_version_cmd.stderr_lines
