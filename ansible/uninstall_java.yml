---
- name: Uninstall Java from target VMs
  hosts: all
  become: true
  gather_facts: true

  vars:
    redhat_java_package: >-
      {{
        "java-17-amazon-corretto"
        if ansible_facts["distribution"] == "Amazon"
        else "java-17-openjdk"
      }}

  tasks:
    - name: Remove Java on Debian/Ubuntu
      ansible.builtin.apt:
        name: default-jdk
        state: absent
        purge: true
      when: ansible_facts["os_family"] == "Debian"

    - name: Remove Java on RHEL-family systems
      ansible.builtin.package:
        name: "{{ redhat_java_package }}"
        state: absent
      when: ansible_facts["os_family"] == "RedHat"